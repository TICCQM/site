<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área Restrita - CCQM</title>

<link rel="icon" type="image/x-icon" href="../imagens/icone.png">


<link rel="stylesheet" href="../css/style.css">
</head>


<a href="../home.html" class="btn-voltar">← Voltar</a>


<body class="login-page">

<a href="../index.html" class="btn-voltar">← Voltar</a>

<div class="login-container">

  <img src="../imagens/CCQM.png" alt="Logo CCQM" class="login-logo">

  <h2>Acesso Restrito</h2>
  <p class="login-subtitle">Entre com suas credenciais</p>

  <form onsubmit="login(event)" class="login-form">

    <div class="input-group">
      <input type="email" id="email" placeholder=" " required>
      <label for="email">E-mail</label>
    </div>

    <div class="input-group">
      <input type="password" id="senha" placeholder=" " required>
      <label for="senha">Senha</label>
    </div>

    <button type="submit" class="btn">Entrar</button>

  </form>

  <div class="login-links">
    <p><a href="#">Esqueci minha senha</a></p>
  </div>

</div>

<script>
function login(event){
  event.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(email === "admin@ccqm.com" && senha === "1234"){
    localStorage.setItem("logado", "true");
    window.location.href = "painel acesso restrito.html";
  } else {
    alert("E-mail ou senha inválidos");
  }
}
</script>

</body>
</html>
